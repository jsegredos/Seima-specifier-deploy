<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fred - Evaluation</title>
  <link rel="icon" type="image/png" href="/Seima-specifier-deploy/assets/seima-logo-Ij4HpjUg.png">
  <style>
    .fe-test-case { border: 1px solid var(--border-primary, #e5e5e5); border-radius: var(--radius-md, 6px); padding: var(--space-3, 12px) var(--space-4, 16px); background: var(--bg-secondary, #f9fafb); }
    .fe-test-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-2, 8px); }
    .fe-test-num { font-size: 12px; font-weight: 600; color: var(--color-copper, #b87333); text-transform: uppercase; letter-spacing: 0.05em; }
    .fe-test-field { margin-bottom: var(--space-2, 8px); }
    .fe-test-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary, #4b5563); margin-bottom: 4px; }
    .fe-test-field input, .fe-test-field textarea {
      width: 100%; border: 1px solid var(--border-primary, #e5e5e5); border-radius: var(--radius-sm, 4px);
      padding: 8px 10px; font-size: 13px; font-family: inherit; line-height: 1.5; box-sizing: border-box;
      background: var(--bg-primary, #fff); transition: border-color 0.15s;
    }
    .fe-test-field input:focus, .fe-test-field textarea:focus { outline: none; border-color: var(--color-copper, #b87333); }
    .fe-test-field textarea { resize: vertical; }
    .fe-test-list { display: flex; flex-direction: column; gap: var(--space-3, 12px); }

    .fe-run-btn {
      padding: 8px 20px; border-radius: var(--radius-md, 6px); border: none;
      background: var(--color-charcoal, #1a1a1a); color: #fff; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .fe-run-btn:hover { background: var(--color-copper, #b87333); }
    .fe-run-btn:disabled { opacity: 0.5; cursor: default; }

    .fe-results { display: flex; flex-direction: column; gap: var(--space-3, 12px); }
    .fe-result { border: 1px solid var(--border-primary, #e5e5e5); border-radius: var(--radius-md, 6px); padding: var(--space-3, 12px); }
    .fe-result.pass { border-color: var(--color-sage, #7c9082); background: var(--color-success-light, #e8f0ea); }
    .fe-result.fail { border-color: var(--color-error, #c44536); background: var(--color-error-light, #fbeae8); }
    .fe-result.pending { border-color: var(--border-primary, #e5e5e5); background: var(--bg-secondary, #f9fafb); }
    .fe-result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .fe-result-status { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 10px; }
    .fe-result.pass .fe-result-status { color: var(--color-sage, #7c9082); background: rgba(124,144,130,0.15); }
    .fe-result.fail .fe-result-status { color: var(--color-error, #c44536); background: rgba(196,69,54,0.15); }
    .fe-result.pending .fe-result-status { color: var(--text-tertiary, #9ca3af); background: var(--bg-secondary, #f5f5f5); }
    .fe-result-question { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .fe-result-answer { font-size: 12px; color: var(--text-secondary, #4b5563); line-height: 1.5; max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .fe-result-expected { font-size: 11px; color: var(--text-tertiary, #9ca3af); margin-top: 4px; }
    .fe-progress { font-size: 13px; color: var(--text-secondary, #4b5563); padding: 8px 0; }
    .fe-empty { text-align: center; color: var(--text-tertiary, #9ca3af); font-size: 13px; padding: 20px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@seima/core": "/core/js/index.js"
    }
  }
  </script>
  <script type="module" crossorigin src="/Seima-specifier-deploy/assets/fredEvaluation-DUqYvvp1.js"></script>
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/preload-helper-CD4qFiWW.js">
  <link rel="stylesheet" crossorigin href="/Seima-specifier-deploy/assets/design-system-in-MCC0p.css">
  <link rel="stylesheet" crossorigin href="/Seima-specifier-deploy/assets/fred-instructions-FY8gt7VF.css">
</head>
<body>
  <div class="fi-app">
    <nav class="fi-navbar">
      <div class="fi-navbar-brand">
        <a href="admin.html" class="fi-navbar-back" title="Back to Admin">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </a>
        <span class="fi-navbar-divider"></span>
        <span class="fi-navbar-title">Fred Evaluation</span>
      </div>
      <div class="fi-navbar-actions">
        <button class="fi-navbar-btn fi-save-btn" id="fe-save-btn" title="Save test cases">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
          Save
        </button>
        <button class="fe-run-btn" id="fe-run-btn">Run All Tests</button>
      </div>
    </nav>

    <div class="fi-content" id="fe-content">
      <section class="fi-section">
        <div class="fi-section-header">
          <h2>Test Cases</h2>
          <p class="fi-section-desc">Define test questions and expected behavior. Run tests after prompt changes to catch regressions.</p>
          <button class="fi-add-btn" id="fe-add-test" title="Add test case">+ Add Test Case</button>
        </div>
        <div class="fe-test-list" id="fe-test-list">
          <div class="fe-empty">No test cases yet. Add some to evaluate Fred's quality.</div>
        </div>
      </section>

      <section class="fi-section" id="fe-results-section" style="display:none;">
        <div class="fi-section-header">
          <h2>Results</h2>
          <div class="fe-progress" id="fe-progress"></div>
        </div>
        <div class="fe-results" id="fe-results"></div>
      </section>
    </div>

    <div class="fi-loading" id="fi-loading">
      <div class="fi-spinner"></div>
      <span>Loading test cases...</span>
    </div>

    <div id="fi-forbidden" class="fi-forbidden" style="display: none;">
      <p>You need Admin access to view this page.</p>
      <p><a href="../index.html">Return to Presenter</a></p>
    </div>
  </div>

</body>
</html>
