<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Verifications</title>
  <link rel="icon" type="image/png" href="/Seima-specifier-deploy/assets/seima-logo-Ij4HpjUg.png">
  <style>
    .ap-app { max-width: 860px; margin: 0 auto; padding: 2rem; }
    .ap-navbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-primary, #e5e7eb); }
    .ap-navbar-back { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-secondary, #4b5563); text-decoration: none; font-size: 0.9rem; }
    .ap-navbar-back:hover { color: var(--text-primary, #111); }
    .ap-title { font-size: 1.5rem; font-weight: 600; margin: 0; }

    /* Stats */
    .ap-stats { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .ap-stat { padding: 0.6rem 1rem; background: var(--bg-secondary, #f9fafb); border: 1px solid var(--border-primary, #e5e7eb); border-radius: 8px; font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem; }
    .ap-stat-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .ap-stat-dot-amber { background: #f59e0b; }
    .ap-stat-dot-red { background: #ef4444; }
    .ap-stat-dot-gray { background: #9ca3af; }
    .ap-stat-count { font-weight: 600; }

    /* Filters */
    .ap-filters { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .ap-tab { padding: 0.4rem 0.75rem; border: 1px solid var(--border-primary, #e5e7eb); border-radius: 6px; background: #fff; font-size: 0.85rem; cursor: pointer; color: var(--text-secondary); }
    .ap-tab:hover { background: var(--bg-tertiary, #f3f4f6); }
    .ap-tab.active { background: var(--text-primary, #111); color: #fff; border-color: var(--text-primary, #111); }
    .ap-select { padding: 0.4rem 0.75rem; border: 1px solid var(--border-primary, #e5e7eb); border-radius: 6px; font-size: 0.85rem; background: #fff; }

    /* Group headers */
    .ap-group-header { font-size: 1rem; font-weight: 600; margin: 1.25rem 0 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .ap-group-count { font-size: 0.75rem; font-weight: 500; background: #f3f4f6; color: #6b7280; padding: 2px 8px; border-radius: 10px; }

    /* Cards */
    .ap-card { border: 1px solid var(--border-primary, #e5e7eb); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; background: #fff; }
    .ap-card-suggestion { border-left: 3px solid #f59e0b; }
    .ap-card-dispute { border-left: 3px solid #ef4444; }
    .ap-card-conflict { border-left: 3px solid #f59e0b; background: #fffbeb; }

    .ap-card-type { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 0.3rem; margin-bottom: 0.6rem; }
    .ap-type-suggestion { background: #fef3c7; color: #92400e; }
    .ap-type-dispute { background: #fee2e2; color: #991b1b; }
    .ap-type-conflict { background: #fef3c7; color: #92400e; }

    .ap-card-match { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
    .ap-card-product { display: flex; align-items: center; gap: 0.5rem; }
    .ap-card-product img { width: 48px; height: 48px; object-fit: contain; border-radius: 4px; background: #f9fafb; border: 1px solid #e5e7eb; }
    .ap-card-product-info { font-size: 0.85rem; }
    .ap-card-product-code { font-weight: 600; color: #111; }
    .ap-card-product-name { color: #6b7280; }
    .ap-card-product-type { font-size: 0.75rem; color: #9ca3af; }
    .ap-card-arrow { color: #9ca3af; font-size: 1.2rem; }
    .ap-arrow-dispute { color: #ef4444; font-weight: 700; }

    .ap-thumb { cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
    .ap-thumb:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); border-color: #2563eb; }

    .ap-card-meta { font-size: 0.75rem; color: #9ca3af; margin-bottom: 0.4rem; }
    .ap-card-reason { font-size: 0.8rem; color: #6b7280; background: #f9fafb; padding: 0.4rem 0.6rem; border-radius: 6px; margin-bottom: 0.6rem; font-style: italic; }
    .ap-card-reason-dispute { background: #fef2f2; }

    .ap-card-alt { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.6rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; margin-bottom: 0.6rem; font-size: 0.8rem; }
    .ap-card-alt img { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; }
    .ap-card-alt-badge { font-size: 0.65rem; font-weight: 600; background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 6px; }

    .ap-card-actions { display: flex; gap: 0.4rem; justify-content: flex-end; }
    .ap-btn { padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.8rem; font-weight: 500; cursor: pointer; border: 1px solid; transition: background 0.15s; }
    .ap-btn-approve { background: #fff; color: #16a34a; border-color: #86efac; }
    .ap-btn-approve:hover { background: #f0fdf4; border-color: #22c55e; }
    .ap-btn-reject { background: #fff; color: #dc2626; border-color: #fca5a5; }
    .ap-btn-reject:hover { background: #fef2f2; border-color: #ef4444; }
    .ap-btn-dismiss { background: #fff; color: #6b7280; border-color: #d1d5db; }
    .ap-btn-dismiss:hover { background: #f3f4f6; }
    .ap-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .ap-badge-verified { font-size: 0.65rem; font-weight: 600; background: #dcfce7; color: #166534; padding: 1px 6px; border-radius: 6px; }

    .ap-empty { text-align: center; padding: 3rem 2rem; color: var(--text-tertiary, #9ca3af); }
    .ap-loading { text-align: center; padding: 3rem 2rem; color: var(--text-secondary, #6b7280); }
    .ap-forbidden { text-align: center; padding: 3rem 2rem; color: var(--text-tertiary); }

    .ap-card-resolved { opacity: 0.5; pointer-events: none; }

    /* Comparison modal */
    .ap-compare-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 9200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .ap-compare-modal { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); width: 100%; max-width: 860px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .ap-compare-header { padding: 1rem 1.25rem; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
    .ap-compare-header h3 { font-size: 1.1rem; font-weight: 600; margin: 0; }
    .ap-compare-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #9ca3af; padding: 0; line-height: 1; }
    .ap-compare-close:hover { color: #374151; }
    .ap-compare-body { display: flex; gap: 0; overflow-y: auto; flex: 1; min-height: 0; }
    .ap-compare-col { flex: 1; padding: 1.25rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .ap-compare-col img { width: 160px; height: 160px; object-fit: contain; border-radius: 8px; border: 1px solid #e5e7eb; background: #f9fafb; margin-bottom: 0.75rem; }
    .ap-compare-col h4 { font-size: 1rem; font-weight: 600; margin: 0 0 0.25rem; color: #111; }
    .ap-compare-name { font-size: 0.85rem; color: #6b7280; margin: 0 0 0.75rem; }
    .ap-compare-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 10px; border-radius: 6px; margin-bottom: 0.75rem; }
    .ap-compare-label-comp { background: #fef3c7; color: #92400e; }
    .ap-compare-label-seima { background: #dbeafe; color: #1e40af; }
    .ap-compare-specs { width: 100%; text-align: left; border-collapse: collapse; }
    .ap-compare-specs td { border-bottom: 1px solid #f3f4f6; }
    .ap-compare-divider { width: 1px; background: #e5e7eb; flex-shrink: 0; }
    .ap-compare-link { display: inline-block; margin-top: 0.75rem; font-size: 0.8rem; color: #2563eb; text-decoration: none; }
    .ap-compare-link:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .ap-compare-body { flex-direction: column; }
      .ap-compare-divider { width: 100%; height: 1px; }
    }
  </style>
