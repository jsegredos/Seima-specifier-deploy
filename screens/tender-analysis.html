<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seima - Tender Analysis</title>
  <link rel="icon" type="image/png" href="/Seima-specifier-deploy/assets/seima-logo-Ij4HpjUg.png">
  <script type="importmap">
  {
    "imports": {
      "@seima/core": "/core/js/index.js"
    }
  }
  </script>
  <script type="module" crossorigin src="/Seima-specifier-deploy/assets/tenderAnalysis-XiitWllP.js"></script>
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/auth-ui-BChQ8TGM.js">
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/product-search-BkgNvEEc.js">
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/product-synonyms-B8Oy5E4e.js">
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/data-layer-u45J67p6.js">
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/config-VMpw2Fyh.js">
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/competitor-service-CvmwPB8A.js">
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/ai-service-C6xusKps.js">
  <link rel="stylesheet" crossorigin href="/Seima-specifier-deploy/assets/ai-service-Cg71NUyX.css">
  <link rel="stylesheet" crossorigin href="/Seima-specifier-deploy/assets/tenderAnalysis-Ek6hVR5y.css">
  <link rel="stylesheet" crossorigin href="/Seima-specifier-deploy/assets/design-system-in-MCC0p.css">
</head>
<body>
  <div class="tender-app">

    <nav class="tender-navbar">
      <div class="tender-navbar-brand">
        <a href="../index.html" class="tender-navbar-back" title="Back to Presenter">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </a>
        <span class="tender-navbar-divider"></span>
        <img src="/Seima-specifier-deploy/assets/seima-logo-Ij4HpjUg.png" alt="SEIMA" class="tender-navbar-logo">
        <span class="tender-navbar-divider"></span>
        <span class="tender-navbar-title">Tender Analysis</span>
      </div>
      <div class="tender-navbar-actions">
        <a href="../index.html" class="btn btn-ghost btn-sm" id="back-to-presenter">Back to Presenter</a>
      </div>
    </nav>

    <div class="tender-container">

      <div class="tender-pdf-pane">
        <div class="tender-dropzone" id="tender-dropzone">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          <h3>Drop tender PDF here</h3>
          <p>or click to browse</p>
          <p class="tender-dropzone-hint">Accepts .pdf files</p>
          <input type="file" id="tender-file-input" accept=".pdf" style="display: none;">
        </div>
        <div class="tender-pdf-pages" id="tender-pdf-pages" style="display: none;"></div>
      </div>

      <div class="tender-analysis-pane">
        <div class="tender-upload-status" id="tender-upload-status" style="display: none;">
          <div class="tender-progress" id="tender-progress">
            <div class="tender-progress-bar">
              <div class="tender-progress-fill" id="tender-progress-fill"></div>
            </div>
            <span class="tender-progress-text" id="tender-progress-text">Preparing...</span>
          </div>
        </div>

        <div class="tender-insights" id="tender-insights" style="display: none;">
          <h3 class="tender-section-title">Tender Insights</h3>
          <div class="tender-insights-grid" id="tender-insights-grid"></div>
        </div>

        <div class="tender-results" id="tender-results" style="display: none;">
          <h3 class="tender-section-title">Product Matches</h3>
          <div class="tender-table-wrap">
            <table class="tender-match-table" id="tender-match-table">
              <thead>
                <tr>
                  <th style="width:40px"><input type="checkbox" id="tender-select-all" checked></th>
                  <th>Specified Product</th>
                  <th>Status</th>
                  <th>Seima Alternative</th>
                </tr>
              </thead>
              <tbody id="tender-match-tbody"></tbody>
            </table>
          </div>
        </div>

        <div class="tender-actions" id="tender-actions" style="display: none;">
          <button class="btn btn-secondary" id="tender-fill-gaps-btn" style="display: none;">Suggest Alternatives for Gaps</button>
          <button class="btn btn-primary" id="tender-import-btn">Import to Grid</button>
          <button class="btn btn-secondary" id="tender-export-csv-btn">Export CSV</button>
          <button class="btn btn-secondary" id="tender-export-pdf-btn">Export Substitution PDF</button>
        </div>

        <div class="tender-empty" id="tender-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
          <p>Upload a tender PDF to begin analysis</p>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
