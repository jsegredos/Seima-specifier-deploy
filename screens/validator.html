<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crosshair - Competitor Match Validator</title>
  <link rel="icon" type="image/png" href="../assets/seima-icon.png">
  <script type="module" crossorigin src="/Seima-specifier-deploy/assets/validator--LS58f67.js"></script>
  <link rel="modulepreload" crossorigin href="/Seima-specifier-deploy/assets/competitor-service-COb0KT1S.js">
  <link rel="stylesheet" crossorigin href="/Seima-specifier-deploy/assets/competitor-service-in-MCC0p.css">
  <link rel="stylesheet" crossorigin href="/Seima-specifier-deploy/assets/validator-COziolCu.css">
</head>
<body>
  <div class="v-app">

    <!-- Header -->
    <header class="v-header">
      <div class="v-header-left">
        <a href="../index.html" class="v-back-link">&larr; Back to Presenter</a>
        <h1 class="v-title">Crosshair Match Validator</h1>
        <div class="v-mode-toggle" id="v-mode-toggle">
          <button class="v-mode-btn active" data-mode="competitor">Competitor View</button>
          <button class="v-mode-btn" data-mode="seima">Seima View</button>
        </div>
      </div>
      <div class="v-header-right">
        <span class="v-stats" id="v-stats"></span>
        <button class="v-settings-btn" id="v-settings-btn" title="Category Settings">&#9881;</button>
      </div>
    </header>

    <!-- Filters bar -->
    <div class="v-filters">
      <select id="f-competitor" class="v-select">
        <option value="">Select competitor...</option>
      </select>
      <select id="f-category" class="v-select">
        <option value="">All Categories</option>
      </select>
      <div class="v-status-checks" id="f-status">
        <label class="v-status-check"><input type="checkbox" value="AI-Suggested"><span class="v-status-label ai-suggested">AI-Suggested</span></label>
        <label class="v-status-check"><input type="checkbox" value="Verified"><span class="v-status-label verified">Verified</span></label>
        <label class="v-status-check"><input type="checkbox" value="Rejected"><span class="v-status-label rejected">Rejected</span></label>
        <label class="v-status-check"><input type="checkbox" value="Manual"><span class="v-status-label manual">Manual</span></label>
        <label class="v-status-check"><input type="checkbox" value="unmatched"><span class="v-status-label unmatched">No Matches</span></label>
      </div>
      <input type="text" id="f-search" class="v-input" placeholder="Search products...">
      <span class="v-count" id="v-count"></span>
    </div>

    <!-- Product list -->
    <div class="v-list" id="v-list">
      <div class="v-loading" id="v-loading">Select a competitor to begin.</div>
    </div>

  </div>
</body>
</html>
